<!--
============================================================================
  CHOMU  —  a tiny one-page web app. Tap a button, hear a funny voice.
============================================================================

  INSTRUCTIONS FOR CLAUDE (read this first):

  GOAL
    Publish this file so it is reachable at a PUBLIC https:// URL that opens
    and plays sound in iPhone Safari. The user is on an iPhone 14 Pro Max.

  WHAT THIS FILE IS
    A fully self-contained web app: HTML + CSS + JS + two short voice clips
    embedded directly as base64 MP3. No build step, no dependencies, no
    network calls. It works offline once loaded.

  DEPLOY STEPS (do these in the repo this chat is scoped to, e.g. avmittrr/chomu)
    1. Save this file at the REPO ROOT as  index.html  (root, not in a
       subfolder) so it serves as the site root. Commit and push to the
       default branch (main).
    2. Enable GitHub Pages. Because the repo is PUBLIC the simple route is:
         Settings -> Pages -> Build and deployment ->
         Source = "Deploy from a branch", Branch = main, Folder = / (root),
         then Save.
       (Only the REPO OWNER can toggle Pages on; an automation/integration
        token cannot create the Pages site — if you hit
        "Resource not accessible by integration", ask the owner to flip that
        one switch, then continue.)
    3. The live URL will be:  https://<owner>.github.io/<repo>/
       e.g.  https://avmittrr.github.io/chomu/
       First publish takes ~1-3 minutes.

  CRITICAL iOS NOTES (do NOT regress these)
    * Sound plays through the Web Audio API by DECODING the embedded MP3.
      This is deliberate: Web Audio IGNORES the iPhone Ring/Silent switch.
      Do NOT switch the primary path back to speechSynthesis — on iOS it is
      muted by the silent switch and also fails inside data: URLs. (speech
      synthesis is kept only as a last-resort fallback.)
    * Must be served over http(s). Local .html files and data: URLs do NOT
      run reliably on iOS Safari — that is why a hosted URL is required.
    * On the phone: turn the volume up; tap a button; you should hear it
      even on silent mode.

  NICE-TO-HAVE (optional, only if asked)
    * Swap the goofy espeak clips for higher-quality ElevenLabs voice clips.
    * Add more phrases/buttons.

  The actual app starts below this comment. Leave it as-is to keep it working.
============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chomu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;font-family:-apple-system,"Comic Sans MS",sans-serif;text-align:center;padding:1.5rem;color:#2b2b2b;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb)}
.emoji{font-size:4rem;animation:bob 1.6s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-14px)}}
h1{font-size:clamp(2.5rem,12vw,5rem);text-shadow:3px 3px 0 #fff}
#say{min-height:2.4rem;font-size:clamp(1.4rem,7vw,2.2rem);font-weight:800;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.2);transition:transform .12s}
#say.pop{transform:scale(1.25)}
button{font:inherit;font-size:clamp(1.2rem,5vw,1.7rem);font-weight:700;padding:1rem 2rem;border:0;border-radius:999px;color:#fff;box-shadow:0 8px 0 rgba(0,0,0,.15);margin:.4rem}
button:active{transform:translateY(6px);box-shadow:0 2px 0 rgba(0,0,0,.15)}
#c{background:linear-gradient(135deg,#f857a6,#ff5858)}
#m{background:linear-gradient(135deg,#5b86e5,#36d1dc)}
small{opacity:.65;font-size:.8rem}
</style>
</head>
<body>
<div class="emoji">🤪</div>
<h1>Chomu</h1>
<div id="say">&nbsp;</div>
<button id="c">I'm a chomu</button>

var ctx,buffers={};
function b64ToBuf(b){var s=atob(b),n=s.length,a=new Uint8Array(n);for(var i=0;i<n;i++)a[i]=s.charCodeAt(i);return a.buffer;}
function ensureCtx(){if(!ctx){var AC=window.AudioContext||window.webkitAudioContext;if(AC)ctx=new AC();}if(ctx&&ctx.state==="suspended")ctx.resume();return ctx;}
function speak(t){if("speechSynthesis"in window){var u=new SpeechSynthesisUtterance(t);u.pitch=2;u.rate=.85;window.speechSynthesis.speak(u);}}
function play(name,text){
var s=document.getElementById("say");s.textContent=text;s.classList.remove("pop");void s.offsetWidth;s.classList.add("pop");
var c=ensureCtx();
if(!c){speak(text);return;}
var go=function(buf){var src=c.createBufferSource();src.buffer=buf;src.connect(c.destination);src.start(0);};
if(buffers[name]){go(buffers[name]);return;}

catch(e){speak(text);}
}
